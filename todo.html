<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskflow — To-Do</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #161618;
      --surface2: #1e1e22;
      --border: #2a2a30;
      --accent: #e8c87a;
      --accent2: #c97a5a;
      --text: #f0ece3;
      --muted: #6b6870;
      --done: #3a3a40;
      --done-text: #555560;
      --red: #d46060;
      --green: #6abf8a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 20px 80px;
      overflow-x: hidden;
    }

    /* Background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 620px;
    }

    /* Header */
    .header {
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
    }

    .header-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 8vw, 64px);
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -1px;
      color: var(--text);
    }

    .header h1 span {
      color: var(--accent);
      font-style: italic;
    }

    .header-sub {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.7s 0.1s ease forwards;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-num.accent { color: var(--accent); }
    .stat-num.green  { color: var(--green); }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .stat-divider {
      width: 1px;
      height: 40px;
      background: var(--border);
      align-self: center;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.7s 0.15s ease forwards;
    }

    .progress-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 99px;
      width: 0%;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }

    /* Input */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.7s 0.2s ease forwards;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .task-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .task-input::placeholder { color: var(--muted); }

    .task-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,200,122,0.08);
    }

    .add-btn {
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 12px;
      padding: 16px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
    }

    .add-btn:hover  { background: #f0d48a; }
    .add-btn:active { transform: scale(0.97); }

    /* Filter tabs */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.7s 0.25s ease forwards;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 7px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { color: var(--text); border-color: #444; }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0d0f;
    }

    /* Task list */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.7s 0.3s ease forwards;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      transition: border-color 0.2s, transform 0.15s, background 0.2s;
      animation: slideIn 0.35s ease;
    }

    .task-item:hover { border-color: #3a3a44; transform: translateY(-1px); }

    .task-item.done {
      background: var(--surface2);
      border-color: var(--done);
    }

    /* Checkbox */
    .check-wrap {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      position: relative;
      cursor: pointer;
    }

    .check-wrap input { display: none; }

    .check-box {
      width: 22px;
      height: 22px;
      border: 1.5px solid var(--muted);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: transparent;
    }

    .check-wrap input:checked ~ .check-box {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-box svg {
      width: 12px;
      height: 12px;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.15s;
    }

    .check-wrap input:checked ~ .check-box svg {
      opacity: 1;
      transform: scale(1);
    }

    /* Task text */
    .task-text-wrap {
      flex: 1;
      min-width: 0;
    }

    .task-text {
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.2s;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--done-text);
    }

    .task-date {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Priority dot */
    .priority-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .p-high   { background: var(--red); }
    .p-medium { background: var(--accent); }
    .p-low    { background: var(--green); }

    /* Delete btn */
    .del-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-item:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: var(--red); background: rgba(212,96,96,0.1); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      display: none;
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-text {
      font-size: 15px;
      font-style: italic;
    }

    /* Priority selector */
    .priority-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
      outline: none;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    .pop { animation: pop 0.25s ease; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="header-label">✦ Your workspace</div>
    <h1>Task<span>flow</span></h1>
    <div class="header-sub">Stay focused. Do what matters.</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num accent" id="total-count">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="pending-count">0</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num green" id="done-count">0</div>
      <div class="stat-label">Done</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>

  <div class="input-row">
    <div class="input-wrap">
      <input class="task-input" id="task-input" type="text" placeholder="What needs to be done?" maxlength="80"/>
    </div>
    <select class="priority-select" id="priority-select">
      <option value="medium">⚡ Medium</option>
      <option value="high">🔴 High</option>
      <option value="low">🟢 Low</option>
    </select>
    <button class="add-btn" id="add-btn">+ Add</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="done">Done</button>
    <button class="filter-btn" data-filter="high">🔴 High</button>
  </div>

  <div class="task-list" id="task-list">
    <div class="empty" id="empty-state">
      <div class="empty-icon">☁️</div>
      <div class="empty-text">Nothing here yet — add your first task!</div>
    </div>
  </div>

</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('taskflow-tasks') || '[]');
  let filter = 'all';

  const list      = document.getElementById('task-list');
  const input     = document.getElementById('task-input');
  const addBtn    = document.getElementById('add-btn');
  const pSelect   = document.getElementById('priority-select');
  const empty     = document.getElementById('empty-state');
  const progFill  = document.getElementById('progress-fill');
  const totalEl   = document.getElementById('total-count');
  const pendingEl = document.getElementById('pending-count');
  const doneEl    = document.getElementById('done-count');

  function save() { localStorage.setItem('taskflow-tasks', JSON.stringify(tasks)); }

  function formatDate() {
    const now = new Date();
    return now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function updateStats() {
    const total   = tasks.length;
    const done    = tasks.filter(t => t.done).length;
    const pending = total - done;
    totalEl.textContent   = total;
    doneEl.textContent    = done;
    pendingEl.textContent = pending;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    progFill.style.width  = pct + '%';
  }

  function getFiltered() {
    if (filter === 'all')     return tasks;
    if (filter === 'done')    return tasks.filter(t => t.done);
    if (filter === 'pending') return tasks.filter(t => !t.done);
    if (filter === 'high')    return tasks.filter(t => t.priority === 'high');
    return tasks;
  }

  function render() {
    const filtered = getFiltered();
    // Remove task items (not the empty state)
    list.querySelectorAll('.task-item').forEach(el => el.remove());

    empty.style.display = filtered.length === 0 ? 'block' : 'none';

    filtered.forEach(task => {
      const item = document.createElement('div');
      item.className = 'task-item' + (task.done ? ' done' : '');
      item.dataset.id = task.id;

      const priorityClass = { high: 'p-high', medium: 'p-medium', low: 'p-low' }[task.priority] || 'p-medium';

      item.innerHTML = `
        <label class="check-wrap">
          <input type="checkbox" ${task.done ? 'checked' : ''}/>
          <div class="check-box">
            <svg viewBox="0 0 12 12" fill="none" stroke="#0d0d0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="2,6 5,9 10,3"/>
            </svg>
          </div>
        </label>
        <div class="task-text-wrap">
          <div class="task-text">${escHtml(task.text)}</div>
          <div class="task-date">${task.date}</div>
        </div>
        <div class="priority-dot ${priorityClass}"></div>
        <button class="del-btn" title="Delete">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/>
          </svg>
        </button>`;

      // Toggle done
      item.querySelector('input[type=checkbox]').addEventListener('change', (e) => {
        const t = tasks.find(t => t.id === task.id);
        if (t) t.done = e.target.checked;
        item.classList.toggle('done', e.target.checked);
        // Pop animation on check-box
        const cb = item.querySelector('.check-box');
        cb.classList.remove('pop');
        void cb.offsetWidth;
        cb.classList.add('pop');
        save(); updateStats(); render();
      });

      // Delete
      item.querySelector('.del-btn').addEventListener('click', () => {
        item.style.transition = 'opacity 0.25s, transform 0.25s';
        item.style.opacity = '0';
        item.style.transform = 'translateX(20px)';
        setTimeout(() => {
          tasks = tasks.filter(t => t.id !== task.id);
          save(); updateStats(); render();
        }, 250);
      });

      list.appendChild(item);
    });

    updateStats();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addTask() {
    const text = input.value.trim();
    if (!text) { input.focus(); input.style.borderColor = 'var(--red)'; setTimeout(()=> input.style.borderColor='', 800); return; }
    tasks.unshift({ id: Date.now().toString(), text, done: false, priority: pSelect.value, date: formatDate() });
    input.value = '';
    save(); render();
    input.focus();
  }

  addBtn.addEventListener('click', addTask);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  // Seed some tasks if empty
  if (tasks.length === 0) {
    tasks = [
      { id: '1', text: 'Design the new landing page mockup', done: false, priority: 'high',   date: 'Mar 17, 9:00 AM' },
      { id: '2', text: 'Review pull requests on GitHub',      done: true,  priority: 'medium', date: 'Mar 17, 8:30 AM' },
      { id: '3', text: 'Write weekly team update email',      done: false, priority: 'medium', date: 'Mar 17, 8:00 AM' },
      { id: '4', text: 'Buy groceries on the way home',       done: false, priority: 'low',    date: 'Mar 16, 6:00 PM' },
    ];
    save();
  }

  render();
</script>
</body>
</html>
